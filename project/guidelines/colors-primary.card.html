<!-- @dsCard group="Colors" viewport="700x160" name="Primary & Accent" subtitle="Navy (primary), Royal Blue (secondary), Growth Red (CTA-only accent)" -->
<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--surface-page);}
  .row{display:flex;height:150px;}
  .sw{flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:12px;color:#fff;font-size:13px;}
  .sw span{display:block;}
  .sw .name{font-weight:600;}
</style>
</head>
<body>
<div class="row">
  <div class="sw" style="background:var(--color-navy);">
    <span class="name">Navy</span><span>#1B2A5E · Primary</span>
  </div>
  <div class="sw" style="background:var(--color-royal-blue);">
    <span class="name">Royal Blue</span><span>#0A4A93 · Secondary</span>
  </div>
  <div class="sw" style="background:var(--color-growth-red);">
    <span class="name">Growth Red</span><span>#E23A28 · Accent (CTA only)</span>
  </div>
</div>
</body>
</html>
