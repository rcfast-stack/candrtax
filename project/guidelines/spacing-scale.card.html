<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:20px;box-sizing:border-box;background:var(--surface-page);font-family:var(--font-body);font-size:11px;color:var(--text-muted);}</style>
</head>
<body>
<div style="display:flex; align-items:flex-end; gap:8px;">
  <div style="text-align:center;"><div style="width:var(--space-1); height:var(--space-1); background:var(--color-royal-blue);"></div>1</div>
  <div style="text-align:center;"><div style="width:var(--space-2); height:var(--space-2); background:var(--color-royal-blue);"></div>2</div>
  <div style="text-align:center;"><div style="width:var(--space-4); height:var(--space-4); background:var(--color-royal-blue);"></div>4</div>
  <div style="text-align:center;"><div style="width:var(--space-6); height:var(--space-6); background:var(--color-royal-blue);"></div>6</div>
  <div style="text-align:center;"><div style="width:var(--space-8); height:var(--space-8); background:var(--color-royal-blue);"></div>8</div>
  <div style="text-align:center;"><div style="width:var(--space-12); height:var(--space-12); background:var(--color-royal-blue);"></div>12</div>
  <div style="text-align:center;"><div style="width:var(--space-16); height:var(--space-16); background:var(--color-royal-blue);"></div>16</div>
  <div style="text-align:center;"><div style="width:var(--space-24); height:var(--space-24); background:var(--color-royal-blue);"></div>24</div>
</div>
</body>
</html>
