<!-- @dsCard group="Colors" viewport="700x160" name="Neutrals" subtitle="Ice Blue, Off-White, Slate, Midnight" -->
<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);}
  .row{display:flex;height:150px;}
  .sw{flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:12px;font-size:13px;}
  .sw .name{font-weight:600;}
</style>
</head>
<body>
<div class="row">
  <div class="sw" style="background:var(--color-ice-blue); color:var(--color-navy);">
    <span class="name">Ice Blue</span><span>#EAF0F8</span>
  </div>
  <div class="sw" style="background:var(--color-off-white); color:var(--color-navy); border-right:1px solid var(--border-subtle);">
    <span class="name">Off-White</span><span>#F7F8FA</span>
  </div>
  <div class="sw" style="background:var(--color-slate); color:#fff;">
    <span class="name">Slate</span><span>#5A6B8C</span>
  </div>
  <div class="sw" style="background:var(--color-midnight); color:#fff;">
    <span class="name">Midnight</span><span>#121D42</span>
  </div>
</div>
</body>
</html>
