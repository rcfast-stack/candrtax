<!-- @dsCard group="Spacing" viewport="700x180" name="Radius & Shadow" subtitle="Card corners and elevation" -->
<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:20px;box-sizing:border-box;background:var(--surface-page);font-family:var(--font-body);font-size:12px;color:var(--text-muted);}
.row{display:flex;gap:20px;}
.box{width:90px;height:90px;background:var(--surface-card);display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px;}
</style>
</head>
<body>
<div class="row">
  <div class="box" style="border-radius:var(--radius-sm); box-shadow:var(--shadow-sm);">sm / sm</div>
  <div class="box" style="border-radius:var(--radius-md); box-shadow:var(--shadow-md);">md / md</div>
  <div class="box" style="border-radius:var(--radius-lg); box-shadow:var(--shadow-lg);">lg / lg</div>
  <div class="box" style="border-radius:var(--radius-pill); box-shadow:var(--shadow-sm);">pill</div>
</div>
</body>
</html>
